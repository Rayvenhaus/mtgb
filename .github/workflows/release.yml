# ============================================================
# MTGB Release Pipeline
# Ministry of Printer Observation & Void Containment
# ============================================================
# Triggers on version tags: v1.0.0, v1.1.0 etc.
# Builds, packages, and publishes MTGB to GitHub Releases.
# Updates the community endpoint DB automatically.
# Signs the MSIX when SignPath approval arrives.
# No llamas were automated in the making of this pipeline.
# ============================================================

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest

    steps:

      # ── Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Extract version from tag ──────────────────────────────
      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $versionFull = "$version.0"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "VERSION_FULL=$versionFull" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
          Write-Host "Version full: $versionFull"

      # ── Setup .NET 8 ──────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Find MakeAppx ─-----------------───────────────────────
      - name: Find MakeAppx
      id: makeappx
      shell: pwsh
      run: |
        $makeAppx = Get-ChildItem `
          "C:\Program Files (x86)\Windows Kits\10\bin" `
          -Recurse -Filter "makeappx.exe" -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -match "x64" } |
          Sort-Object FullName -Descending |
          Select-Object -First 1 -ExpandProperty FullName

        if (-not $makeAppx) {
            Write-Error "MakeAppx.exe not found on runner."
            exit 1
        }

        Write-Host "Found MakeAppx at: $makeAppx"
        echo "MAKEAPPX_PATH=$makeAppx" >> $env:GITHUB_ENV

      # ── Restore ───────────────────────────────────────────────
      - name: Restore
        shell: pwsh
        run: |
          cd src\MTGB
          dotnet restore
          Write-Host "Restore complete."

      # ── Build ─────────────────────────────────────────────────
      - name: Build
        shell: pwsh
        run: |
          cd src\MTGB
          dotnet build -c Release --no-restore --nologo
          Write-Host "Build complete."

      # ── Package ───────────────────────────────────────────────
      - name: Package
        shell: pwsh
        run: |
          .\package.ps1 `
            -Version "${{ steps.version.outputs.VERSION_FULL }}"
          Write-Host "Package complete."

      # ── Sign MSIX (placeholder — enable when SignPath approves)
      # - name: Sign MSIX
      #   shell: pwsh
      #   run: |
      #     # SignPath signing step goes here
      #     Write-Host "Signing placeholder."

      # ── Rename release assets ─────────────────────────────────
      - name: Rename assets
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION_FULL }}"
          $msix = "dist\MTGB-$v-x64.msix"
          $zip  = "dist\MTGB-$v-x64-portable.zip"

          # Rename to clean version tag format for GitHub release
          $tag = "${{ steps.version.outputs.TAG }}"
          Rename-Item $msix "dist\MTGB-$tag-x64.msix"
          Rename-Item $zip  "dist\MTGB-$tag-x64-portable.zip"

          Write-Host "Assets renamed."
          dir dist\

      # ── Extract changelog entry ───────────────────────────────
      - name: Extract changelog
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $content = Get-Content "src\MTGB\changelog.md" -Raw

          # Extract the section for this version
          $pattern = "## \[$version\].*?(?=## \[|\z)"
          $match = [regex]::Match(
              $content,
              $pattern,
              [System.Text.RegularExpressions.RegexOptions]::Singleline)

          if ($match.Success) {
              $notes = $match.Value.Trim()
          } else {
              $notes = "Release $version"
          }

          # Write to file to avoid multiline env var issues
          $notes | Out-File -FilePath "release_notes.txt" `
              -Encoding UTF8
          Write-Host "Changelog extracted."

      # ── Create GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MTGB ${{ steps.version.outputs.TAG }}"
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: |
            dist/MTGB-${{ steps.version.outputs.TAG }}-x64.msix
            dist/MTGB-${{ steps.version.outputs.TAG }}-x64-portable.zip

      # ── Update community DB ───────────────────────────────────
      - name: Update community release endpoint
        shell: pwsh
        run: |
          $tag     = "${{ steps.version.outputs.TAG }}"
          $version = "${{ steps.version.outputs.VERSION }}"
          $baseUrl = "https://github.com/Rayvenhaus/mtgb" +
                     "/releases/download/$tag"
          $msixUrl = "$baseUrl/MTGB-$tag-x64.msix"
          $zipUrl  = "$baseUrl/MTGB-$tag-x64-portable.zip"

          # Read release notes
          $notes = Get-Content "release_notes.txt" -Raw

          $payload = @{
              version       = $version
              msix_url      = $msixUrl
              zip_url       = $zipUrl
              release_notes = $notes
              release_date  = (Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          } | ConvertTo-Json

          $response = Invoke-RestMethod `
              -Uri "https://community.myndworx.com/mtgb/v1/release/publish" `
              -Method POST `
              -Headers @{
                  "User-Agent"    = "MTGB-Pipeline/$version"
                  "X-Publish-Key" = "${{ secrets.COMMUNITY_PUBLISH_KEY }}"
                  "Content-Type"  = "application/json"
              } `
              -Body $payload

          Write-Host "Community endpoint updated:"
          Write-Host ($response | ConvertTo-Json)

          if (-not $response.status) {
              Write-Error "Failed to update community endpoint."
              exit 1
          }

      # ── Done ──────────────────────────────────────────────────
      - name: Done
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.TAG }}"
          Write-Host "============================================"
          Write-Host " MTGB $v released."
          Write-Host " The Ministry has shipped."
          Write-Host " No llamas were harmed."
          Write-Host "============================================"